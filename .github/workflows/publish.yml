name: Publish Articles

on:
  schedule:
    - cron: "0 17 * * *"

  workflow_dispatch:
    inputs:
      slug:
        description: "Article slug to publish (or 'all' for all unpublished)"
        required: false
        default: "all"
      dry_run:
        description: "Dry run (no API calls)"
        type: boolean
        default: false
      platforms:
        description: "Comma-separated platforms (devto,hashnode,medium) or 'all'"
        required: false
        default: "all"
      force:
        description: "Force re-publish even if unchanged"
        type: boolean
        default: false
      due_only:
        description: "Only publish unpublished articles due by publishAfter"
        type: boolean
        default: false
      limit:
        description: "Maximum number of articles to publish"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build publish command
        id: cmd
        run: |
          CMD="python -m publish"
          SLUG="${{ github.event.inputs.slug || 'all' }}"
          if [ "$SLUG" = "all" ] || [ -z "$SLUG" ]; then
            CMD="$CMD --all"
          else
            CMD="$CMD $SLUG"
          fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          PLATFORMS="${{ github.event.inputs.platforms || 'all' }}"
          if [ -n "$PLATFORMS" ] && [ "$PLATFORMS" != "all" ]; then
            CMD="$CMD --platform $PLATFORMS"
          fi
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            CMD="$CMD --force"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.due_only || 'false' }}" = "true" ]; then
            CMD="$CMD --due-only"
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LIMIT="1"
          fi
          if [ -n "$LIMIT" ]; then
            CMD="$CMD --limit $LIMIT"
          fi
          echo "cmd=$CMD" >> "$GITHUB_OUTPUT"

      - name: Check publishing secrets
        id: secrets
        env:
          HAS_DEVTO: ${{ secrets.DEVTO_API_KEY != '' }}
          HAS_HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN != '' }}
          HAS_HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID != '' }}
          HAS_MEDIUM: ${{ secrets.MEDIUM_TOKEN != '' }}
        run: |
          HAS_PLATFORM="false"
          if [ "$HAS_DEVTO" = "true" ]; then
            HAS_PLATFORM="true"
          fi
          if [ "$HAS_HASHNODE_TOKEN" = "true" ] && [ "$HAS_HASHNODE_PUBLICATION_ID" = "true" ]; then
            HAS_PLATFORM="true"
          fi
          if [ "$HAS_MEDIUM" = "true" ]; then
            HAS_PLATFORM="true"
          fi

          echo "has_platform=$HAS_PLATFORM" >> "$GITHUB_OUTPUT"
          if [ "$HAS_PLATFORM" != "true" ]; then
            echo "::warning::No publishing platform secrets are configured. Add DEVTO_API_KEY, HASHNODE_TOKEN + HASHNODE_PUBLICATION_ID, or MEDIUM_TOKEN in repository secrets."
          fi

      - name: Run publish
        if: steps.secrets.outputs.has_platform == 'true'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
        run: ${{ steps.cmd.outputs.cmd }} --verbose

      - name: Commit publish state
        if: steps.secrets.outputs.has_platform == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .publish-state.json */index.md
          git diff --cached --quiet || git commit -m "Update publish state [skip ci]"
          git push
